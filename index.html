<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel 3D Interactivo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Santa Lucia</h1>
        <p class="instruction">Distrito Emergente</p>
        
        <div class="carousel-container">
            <div class="carousel" id="carousel">
                <!-- Elemento 1 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo1.com" target="_blank">
                        <img src="img/isla.jpeg" alt="Imagen 1">
                        <div class="description">Isla del amor</div>
                    </a>
                </div>
                
                <!-- Elemento 2 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo2.com" target="_blank">
                        <img src="img/plaza.jpg" alt="Imagen 2">
                        <div class="description">Plaza de armas</div>
                    </a>
                </div>
                
                <!-- Elemento 3 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo3.com" target="_blank">
                        <img src="img/ptrabajo.jpg" alt="Imagen 3">
                        <div class="description">Parque el Trabajo</div>
                    </a>
                </div>
                
                <!-- Elemento 4 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo4.com" target="_blank">
                        <img src="img/puente.jpg" alt="Imagen 4">
                        <div class="description">Puente Huallaga</div>
                    </a>
                </div>
                
                <!-- Elemento 5 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo5.com" target="_blank">
                        <img src="img/pvirgen.jpg" alt="Imagen 5">
                        <div class="description">Parque Virgen Santa Lucia</div>
                    </a>
                </div>
                
                <!-- Elemento 6 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo6.com" target="_blank">
                        <img src="img/quebrada.jpg" alt="Imagen 6">
                        <div class="description">Quebrada Santa Lucia</div>
                    </a>
                </div>
                
                <!-- Elemento 7 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo7.com" target="_blank">
                        <img src="img/piscina.jpg" alt="Imagen 7">
                        <div class="description">Piscina Municipal</div>
                    </a>
                </div>
                
                <!-- Elemento 8 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo8.com" target="_blank">
                        <img src="img/laguna.jpg" alt="Imagen 8">
                        <div class="description">Laguna de Villahermosa</div>
                    </a>
                </div>
                
                <!-- Elemento 9 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo9.com" target="_blank">
                        <img src="img/cascada.jpg" alt="Imagen 9">
                        <div class="description">Cascada Santa Rosa</div>
                    </a>
                </div>
                
                <!-- Elemento 10 -->
                <div class="carousel-item">
                    <a href="https://www.ejemplo10.com" target="_blank">
                        <img src="img/iglesia.jpg" alt="Imagen 10">
                        <div class="description">Iglesia</div>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">Girando</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
